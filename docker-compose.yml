name: ostravel

services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ostravel}
      POSTGRES_USER: ${POSTGRES_USER:-ostravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ostravel}
    ports:
      - "127.0.0.1:5432:5432"
    command:
      - postgres
      - -c
      - shared_buffers=128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ostravel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ostravel} -d ${POSTGRES_DB:-ostravel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: ./docker/php
    mem_limit: 256m
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://ostravel:ostravel@postgres:5432/ostravel?serverVersion=16&charset=utf8}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ostravel

  nginx:
    image: nginx:1.27-alpine
    mem_limit: 64m
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ostravel

volumes:
  postgres_data:

networks:
  ostravel:
    driver: bridge
