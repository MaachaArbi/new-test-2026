security:
    password_hashers:
        App\Modules\Core\Infrastructure\Security\SymfonyPasswordHasher: 'auto'
        App\Modules\Core\Infrastructure\Security\SecurityUser: 'auto'

    providers:
        core_credential_user_provider:
            id: App\Modules\Core\Infrastructure\Security\CoreCredentialUserProvider

    firewalls:
        # Login JSON avant le firewall API JWT (ordre Lexik).
        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            provider: core_credential_user_provider
            json_login:
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api/v1
            stateless: true
            provider: core_credential_user_provider
            jwt: ~

        # Hors API (futur back-office HTML éventuel) — pas d'auth pour l'instant.
        main:
            lazy: true
            security: false

    access_control:
        - { path: ^/api/v1, methods: [OPTIONS], roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            App\Modules\Core\Infrastructure\Security\SymfonyPasswordHasher:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
            App\Modules\Core\Infrastructure\Security\SecurityUser:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
