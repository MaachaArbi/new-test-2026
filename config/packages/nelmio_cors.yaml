# CORS — origines explicites uniquement (pas de wildcard '*').
# Liste via CORS_ALLOW_ORIGIN (.env) : une origine exacte.
# Pour plusieurs origines, ajouter des entrées dans allow_origin ci-dessous.
nelmio_cors:
    defaults:
        origin_regex: false
        allow_credentials: false
        allow_origin: []
        allow_headers: []
        allow_methods: []
        expose_headers: []
        max_age: 0
    paths:
        '^/api/':
            allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
            allow_headers: ['Content-Type', 'Authorization']
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            expose_headers: ['X-Request-Id']
            max_age: 3600
